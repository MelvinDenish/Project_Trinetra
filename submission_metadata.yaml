# ============================================================================
# AI tools declaration (transparency only — not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Claude (Claude Code) was used as a pair-engineering assistant: data profiling,
  architecture discussion, drafting and reviewing code, and writing tests and
  docs. All design decisions (narrative-only signal, the honeypot gate calibrated
  on the real pool, the calibrated blend, the offline reproducibility design) are
  the team's own engineering and are defensible at Stage 5. No candidate data was
  sent to any hosted LLM; the ranking step makes no network calls at all.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Evidence-Grounded Hybrid Ranker. Profiling showed the skills array and
  education field are decoys (uniform-random, role-independent), so ranking is
  driven by the free-text career NARRATIVE: a dense sentence-transformer
  (BAAI/bge-small-en-v1.5) + BM25 hybrid scored against structured JD
  aspect-queries. Structured rule features add role/seniority/domain fit and
  career-trajectory negatives (consulting-only, title-chasing, research-only,
  framework-only, no-recent-code). A plausibility gate (calibrated on the full
  pool) removes honeypots; geography and behavioral availability are bounded
  multipliers. A local cross-encoder reranks the ~1K shortlist to sharpen the
  top-10. Reasoning is deterministic evidence-ledger NLG (no hallucination).
  Embeddings/index are precomputed offline; the ranking step is CPU-only, makes
  no network calls, and completes well within 5 minutes.

